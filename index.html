    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Qué es AgendaYa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AgendaYa es un sistema de reservas online para negocios en Perú. Permite a barberías, salones de belleza, consultorios y más recibir reservas 24/7 desde una página personalizada, con notificaciones automáticas por WhatsApp."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuánto cuesta AgendaYa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AgendaYa cuesta S/. 69 al mes, sin contrato y cancela cuando quieras. Incluye reservas ilimitadas, página pública personalizada, notificaciones WhatsApp y panel de control completo."
          }
        },
        {
          "@type": "Question",
          "name": "¿Para qué tipo de negocios es AgendaYa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AgendaYa es ideal para barberías, salones de belleza, spas, consultorios médicos, veterinarias, gimnasios y cualquier negocio que atienda clientes con cita previa en Perú."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo funciona el sistema de reservas?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El cliente entra a tu página personalizada en agendaya.online/book/tu-negocio, elige el servicio, fecha y hora, e ingresa su número de WhatsApp. Automáticamente recibe confirmación y recordatorio 24 horas antes de su cita."
          }
        },
        {
          "@type": "Question",
          "name": "¿Necesito instalar algo para usar AgendaYa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. AgendaYa funciona completamente desde el navegador web, en computadora y celular. No requiere instalar ninguna aplicación. También puedes agregarlo a tu pantalla de inicio como app."
          }
        }
      ]
    }
    </script>
